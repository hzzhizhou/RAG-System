# 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存管理
maxmemory 512mb
maxmemory-policy allkeys-lru

# 性能优化
tcp-keepalive 300
timeout 0

# 日志
loglevel notice
logfile ""

# 数据库数量
databases 16

# 快照配置
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

requirepass Redis@RAGChat_2026